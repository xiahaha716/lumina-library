<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina AI 图书馆助手</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7f9; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #app { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; overflow: hidden; }
    .header { background: #4a90e2; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
    .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; word-wrap: break-word; }
    .msg-ai { background: #f1f3f5; color: #333; align-self: flex-start; border-bottom-left-radius: 0; }
    .msg-user { background: #4a90e2; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
    .input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; }
    button { background: #4a90e2; color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
    button:hover { background: #357abd; }
    button:disabled { background: #a0c4e8; cursor: not-allowed; }
    .loading { font-size: 0.9rem; color: #888; text-align: center; font-style: italic; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">Lumina 智能图书馆</div>

  <div class="chat-box" id="chatBox">
    <div v-for="(msg, index) in messages" :key="index"
         :class="['message', msg.role === 'ai' ? 'msg-ai' : 'msg-user']">
      {{ msg.content }}
    </div>
    <div v-if="isLoading" class="loading">AI 正在思考并翻阅书架...</div>
  </div>

  <div class="input-area">
    <input type="text" v-model="inputText" @keyup.enter="sendMessage" placeholder="例如：咱们图书馆有刘慈欣的书吗？" :disabled="isLoading">
    <button @click="sendMessage" :disabled="isLoading || !inputText.trim()">发送</button>
  </div>
</div>

<script>
  const { createApp, ref, nextTick } = Vue;

  createApp({
    setup() {
      // 初始化聊天记录
      const messages = ref([
        { role: 'ai', content: '你好！我是 Lumina 智能图书管理员。你想找什么书？或者想了解目前的馆藏？' }
      ]);
      const inputText = ref('');
      const isLoading = ref(false);

      // 发送消息的方法
      const sendMessage = async () => {
        const text = inputText.value.trim();
        if (!text) return;

        // 1. 把用户的话显示在界面上
        messages.value.push({ role: 'user', content: text });
        inputText.value = '';
        isLoading.value = true;
        scrollToBottom();

        try {
          // 2. 核心：向咱们的网关发送真正的 HTTP 请求！
          // 注意：因为网页本身就在 8888 端口，所以直接写 /ai/chat 即可
          const response = await axios.get(`/ai/chat?message=${encodeURIComponent(text)}`);

          // 3. 解析咱们之前写好的 Result 包装类
          if (response.data.code === 200) {
            messages.value.push({ role: 'ai', content: response.data.data });
          } else {
            messages.value.push({ role: 'ai', content: '系统提示：' + response.data.message });
          }
        } catch (error) {
          messages.value.push({ role: 'ai', content: '网络通讯失败，请检查后端服务是否启动。' });
        } finally {
          isLoading.value = false;
          scrollToBottom();
        }
      };

      // 让聊天框始终滚动到最底部
      const scrollToBottom = () => {
        nextTick(() => {
          const box = document.getElementById('chatBox');
          if (box) box.scrollTop = box.scrollHeight;
        });
      };

      return { messages, inputText, isLoading, sendMessage };
    }
  }).mount('#app');
</script>

</body>
</html>
